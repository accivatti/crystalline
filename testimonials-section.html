<style>
/* ============ Testimonials section (namespaced .tm-*) ============ */
.tm{
  background:#23201A;            /* dark feature band, like the lead sections */
  color:#F4EEDF;
  padding:clamp(4.5rem,9vw,8rem) clamp(1.25rem,5vw,3rem);
}
.tm-head{ max-width:60ch; margin:0 auto clamp(2.75rem,6vw,4.25rem); text-align:center; }
.tm-eyebrow{

  color:#C9A24B; margin:0 0 1rem;
}
.tm-title{
  font-family:'Fraunces',Georgia,serif;

}

}
.tm-grid{

  display:grid; grid-template-columns:repeat(3,1fr); gap:clamp(1rem,2.2vw,1.5rem);
  align-items:start;
}
.tm-card{

  padding:clamp(1.5rem,2.4vw,2rem);
}
.tm-card--accent{

.tm-stars{ color:#C9A24B; font-size:.85rem; letter-spacing:.18em; margin:0 0 1rem; }
.tm-quote{

.tm-name{

.tm .reveal{ opacity:0; transform:translateY(18px); transition:opacity .7s ease, transform .7s ease; }
.tm .reveal.is-in{ opacity:1; transform:none; }
